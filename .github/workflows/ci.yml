name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend checks
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check version facts
        run: npm run version:check

      - name: Check document facts
        run: npm run docs:check

      - name: Check formatting
        run: npm run format:check

      - name: Lint frontend
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run frontend tests
        run: npm run test

  rust-tests:
    name: Rust tests
    runs-on: ubuntu-24.04
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y build-essential curl file libayatana-appindicator3-dev libssl-dev libwebkit2gtk-4.1-dev libxdo-dev librsvg2-dev patchelf wget

      - name: Check Rust formatting
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: Lint Rust
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test

  rag-eval:
    name: RAG evaluation gates
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Run RAG broker eval (FTS-only)
        working-directory: src-tauri
        run: cargo test --test rag_broker_eval -- --nocapture

  windows-desktop-persistence-e2e:
    name: Windows Markdown persistence desktop E2E
    runs-on: windows-2022
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build Windows desktop executable
        run: npm run tauri -- build --no-bundle

      - name: Install pinned Tauri WebDriver tools
        shell: pwsh
        env:
          IRIS_WEBDRIVER_TOOLS: ${{ runner.temp }}\iris-webdriver-tools
        run: |
          $ErrorActionPreference = "Stop"
          cargo install tauri-driver --version 2.0.6 --locked --root "$env:IRIS_WEBDRIVER_TOOLS"
          cargo install --git https://github.com/chippers/msedgedriver-tool --rev 8c4b34f51b45f5cf08013366d703de464ab871d1 --root "$env:IRIS_WEBDRIVER_TOOLS"
          & "$env:IRIS_WEBDRIVER_TOOLS/bin/msedgedriver-tool.exe"
          if (-not (Test-Path "$PWD/msedgedriver.exe")) {
            throw "msedgedriver-tool did not produce msedgedriver.exe"
          }
          "$env:IRIS_WEBDRIVER_TOOLS/bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $PWD.Path | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Run Windows Markdown persistence desktop E2E
        shell: pwsh
        run: npm run test:desktop:windows
