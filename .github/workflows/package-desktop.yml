name: Package Desktop

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-quality:
    name: Release quality gate
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y build-essential curl file libayatana-appindicator3-dev libssl-dev libwebkit2gtk-4.1-dev libxdo-dev librsvg2-dev patchelf wget

      - name: Install dependencies
        run: npm ci

      - name: Check release version facts
        run: npm run version:check

      - name: Check document facts
        run: npm run docs:check

      - name: Check frontend formatting
        run: npm run format:check

      - name: Lint frontend
        run: npm run lint

      - name: Typecheck frontend
        run: npm run typecheck

      - name: Run frontend tests
        run: npm run test

      - name: Check Rust formatting
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: Lint Rust
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test

  package-windows:
    name: Windows x64 NSIS
    runs-on: windows-2022
    timeout-minutes: 60
    needs: release-quality

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Restore embedded BGE model
        uses: actions/cache@v5
        with:
          path: .iris-dev/models/bge-small-zh-v1.5
          key: ${{ runner.os }}-bge-small-zh-v1.5-fcecc3c5fef6becfa2b2bdda15c1c938857be534

      - name: Verify or prepare embedded BGE model
        run: npm run model:prepare

      - name: Verify Tauri updater signing secrets
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if (-not $env:TAURI_SIGNING_PRIVATE_KEY) {
            Write-Error "Missing TAURI_SIGNING_PRIVATE_KEY. Configure the Tauri updater private key in GitHub Secrets before packaging desktop releases."
          }
          if (-not $env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD) {
            Write-Error "Missing TAURI_SIGNING_PRIVATE_KEY_PASSWORD. Configure the Tauri updater private key password in GitHub Secrets before packaging desktop releases."
          }

      - name: Package Windows NSIS installer
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run package:local:win

      - name: Verify Windows desktop package
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: node scripts/verify-desktop-package.mjs win

      - name: Install Tauri WebDriver tools
        shell: pwsh
        run: |
          cargo install tauri-driver --version 2.0.6 --locked
          cargo install --git https://github.com/chippers/msedgedriver-tool --rev 8c4b34f51b45f5cf08013366d703de464ab871d1
          & "$HOME/.cargo/bin/msedgedriver-tool.exe"
          if (-not (Test-Path "$PWD/msedgedriver.exe")) {
            throw "msedgedriver-tool did not produce msedgedriver.exe"
          }
          "$HOME/.cargo/bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $PWD.Path | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Run Windows Markdown persistence desktop E2E
        shell: pwsh
        run: npm run test:desktop:windows

      - name: Upload Windows installer and updater signature
        uses: actions/upload-artifact@v6
        with:
          name: iris-windows-x64-nsis
          path: |
            .iris-dev/target/release/bundle/nsis/*setup.exe
            .iris-dev/target/release/bundle/nsis/*setup.exe.sig
          if-no-files-found: error
          retention-days: 14

  package-macos-arm64:
    name: macOS arm64 DMG
    runs-on: macos-latest
    timeout-minutes: 60
    needs: release-quality

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Restore embedded BGE model
        uses: actions/cache@v5
        with:
          path: .iris-dev/models/bge-small-zh-v1.5
          key: ${{ runner.os }}-bge-small-zh-v1.5-fcecc3c5fef6becfa2b2bdda15c1c938857be534

      - name: Verify or prepare embedded BGE model
        run: npm run model:prepare

      - name: Verify Tauri updater signing secrets
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "::error::Missing TAURI_SIGNING_PRIVATE_KEY. Configure the Tauri updater private key in GitHub Secrets before packaging desktop releases."
            exit 1
          fi
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" ]; then
            echo "::error::Missing TAURI_SIGNING_PRIVATE_KEY_PASSWORD. Configure the Tauri updater private key password in GitHub Secrets before packaging desktop releases."
            exit 1
          fi

      - name: Package macOS DMG
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: node scripts/package-local.mjs --no-sqlite-vec mac

      - name: Verify macOS desktop package
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: node scripts/verify-desktop-package.mjs mac

      - name: Upload macOS DMG and updater bundle
        uses: actions/upload-artifact@v6
        with:
          name: iris-macos-arm64-dmg
          path: |
            .iris-dev/target/release/bundle/dmg/*.dmg
            .iris-dev/target/release/bundle/macos/*.app.tar.gz
            .iris-dev/target/release/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: error
          retention-days: 14

  draft-release:
    name: Draft GitHub Release
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: [package-windows, package-macos-arm64]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Download Windows installer artifact
        uses: actions/download-artifact@v7
        with:
          name: iris-windows-x64-nsis
          path: release-assets/windows

      - name: Download macOS DMG artifact
        uses: actions/download-artifact@v7
        with:
          name: iris-macos-arm64-dmg
          path: release-assets/macos

      - name: Build Tauri updater latest.json
        shell: bash
        run: |
          node scripts/build-updater-manifest.mjs \
            --version "$GITHUB_REF_NAME" \
            --asset-base-url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}" \
            --assets-dir release-assets \
            --out release-assets/latest.json

      - name: Verify updater release assets
        shell: bash
        run: |
          node scripts/verify-updater-release.mjs \
            --version "$GITHUB_REF_NAME" \
            --asset-base-url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}" \
            --assets-dir release-assets \
            --manifest release-assets/latest.json

      - name: Create or update draft release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s globstar nullglob
          assets=(
            release-assets/windows/**/*setup.exe
            release-assets/windows/**/*setup.exe.sig
            release-assets/macos/**/*.dmg
            release-assets/macos/**/*.app.tar.gz
            release-assets/macos/**/*.app.tar.gz.sig
            release-assets/latest.json
          )

          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            is_draft="$(gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --json isDraft --jq .isDraft)"
            if [ "$is_draft" != "true" ]; then
              echo "::error::Release $GITHUB_REF_NAME already exists and is not a draft. Refusing to modify a published release."
              exit 1
            fi

            gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --title "$GITHUB_REF_NAME" --draft --generate-notes --verify-tag
          fi
