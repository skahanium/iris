name: Package Desktop

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package-windows:
    name: Windows x64 NSIS
    runs-on: windows-2022
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Restore embedded BGE model
        uses: actions/cache@v5
        with:
          path: .iris-dev/models/bge-small-zh-v1.5
          key: ${{ runner.os }}-bge-small-zh-v1.5-fcecc3c5fef6becfa2b2bdda15c1c938857be534

      - name: Verify or prepare embedded BGE model
        run: npm run model:prepare
      - name: Package Windows NSIS installer
        run: npm run package:local:win

      - name: Upload Windows installer
        uses: actions/upload-artifact@v6
        with:
          name: iris-windows-x64-nsis
          path: .iris-dev/target/release/bundle/nsis/*setup.exe
          if-no-files-found: error
          retention-days: 14

  package-macos-arm64:
    name: macOS arm64 DMG
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Restore embedded BGE model
        uses: actions/cache@v5
        with:
          path: .iris-dev/models/bge-small-zh-v1.5
          key: ${{ runner.os }}-bge-small-zh-v1.5-fcecc3c5fef6becfa2b2bdda15c1c938857be534

      - name: Verify or prepare embedded BGE model
        run: npm run model:prepare
      - name: Package macOS DMG
        run: node scripts/package-local.mjs --no-sqlite-vec mac

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v6
        with:
          name: iris-macos-arm64-dmg
          path: .iris-dev/target/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 14

  draft-release:
    name: Draft GitHub Release
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: [package-windows, package-macos-arm64]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download Windows installer artifact
        uses: actions/download-artifact@v7
        with:
          name: iris-windows-x64-nsis
          path: release-assets/windows

      - name: Download macOS DMG artifact
        uses: actions/download-artifact@v7
        with:
          name: iris-macos-arm64-dmg
          path: release-assets/macos

      - name: Create or update draft release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          assets=(release-assets/windows/*setup.exe release-assets/macos/*.dmg)

          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            is_draft="$(gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --json isDraft --jq .isDraft)"
            if [ "$is_draft" != "true" ]; then
              echo "::error::Release $GITHUB_REF_NAME already exists and is not a draft. Refusing to modify a published release."
              exit 1
            fi

            gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --title "$GITHUB_REF_NAME" --draft --generate-notes --verify-tag
          fi
