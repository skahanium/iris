name: Package Desktop

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package-windows:
    name: Windows x64 NSIS
    runs-on: windows-2022
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Package Windows NSIS installer
        run: npm run package:local:win

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: iris-windows-x64-nsis
          path: .iris-dev/target/release/bundle/nsis/*setup.exe
          if-no-files-found: error
          retention-days: 14

  package-macos-arm64:
    name: macOS arm64 DMG
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Package macOS DMG
        run: node scripts/package-local.mjs --no-sqlite-vec mac

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: iris-macos-arm64-dmg
          path: .iris-dev/target/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 14
